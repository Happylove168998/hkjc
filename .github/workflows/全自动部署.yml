name: 全自动部署

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-and-notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 准备网站文件
        run: |
          mkdir -p _site
          for f in 工作台.html 索引.html index.html; do
            [ -f "$f" ] && cp "$f" _site/index.html && break
          done

      - name: 部署到gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true

      - name: 发邮件通知
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: |
          python3 -c "
          import smtplib, os
          from email.mime.text import MIMEText
          from datetime import datetime
          user = os.environ.get('GMAIL_USER','')
          pwd = os.environ.get('GMAIL_PASS','')
          if not user or not pwd:
              exit()
          msg = MIMEText(f'网站已自动更新\n时间：{datetime.now().strftime(\"%Y-%m-%d %H:%M\")}\n地址：https://happylove168998.github.io/hkjc', 'plain', 'utf-8')
          msg['Subject'] = '✅ 工作台已更新'
          msg['From'] = user
          msg['To'] = user
          s = smtplib.SMTP_SSL('smtp.gmail.com', 465)
          s.login(user, pwd)
          s.sendmail(user, user, msg.as_string())
          s.quit()
          print('邮件发送成功')
          "
