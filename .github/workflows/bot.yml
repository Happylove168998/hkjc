name: 🤖 OMNI BOT
on:
  workflow_dispatch:
    inputs:
      task:
        description: '输入任务'
        required: true
        default: '搜索今天最新科技新闻'
jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python bot.py
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          BOT_TASK: ${{ github.event.inputs.task }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-results
          path: results/
