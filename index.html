<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI-BOY OS</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

header{
font-size:30px;
padding:25px;
color:#22d3ee;
letter-spacing:2px;
}

.panel{
margin:10px;
}

button{
background:#22d3ee;
border:none;
padding:12px 20px;
margin:6px;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

#chatbox{
width:90%;
max-width:700px;
height:320px;
background:#111827;
margin:auto;
overflow:auto;
padding:15px;
border-radius:10px;
text-align:left;
}

input{
width:70%;
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

</style>
</head>

<body>

<header>
AI-BOY OS Ultimate
</header>

<div class="panel">

<button onclick="systemStatus()">系统状态</button>
<button onclick="scanSecurity()">安全扫描</button>
<button onclick="startAI()">启动AI</button>

</div>

<div id="chatbox"></div>

<div>

<input id="userInput" placeholder="输入命令或聊天">
<button onclick="send()">发送</button>

</div>

<script>

function add(text){
let box=document.getElementById("chatbox");
box.innerHTML+=text+"<br>";
box.scrollTop=box.scrollHeight;
}

function systemStatus(){
add("AI-BOY: 系统运行正常");
}

function scanSecurity(){
add("AI-BOY: 正在扫描安全...");
setTimeout(()=>{add("AI-BOY: 未发现漏洞");},1500);
}

function startAI(){
add("AI-BOY: AI模块已启动");
}

function send(){

let input=document.getElementById("userInput").value;

add("你: "+input);

let reply="AI-BOY: 我理解你的命令";

if(input.includes("你好")) reply="AI-BOY: 你好，我已在线";
if(input.includes("状态")) reply="AI-BOY: 系统一切正常";
if(input.includes("安全")) reply="AI-BOY: 安全级别：最高";

setTimeout(()=>{
add(reply);
},500);

document.getElementById("userInput").value="";

}

</script>

</body>
</html>
