<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI-BOY OS Ultimate</title>

<style>

body{
background:#020617;
color:#22d3ee;
font-family:Arial;
margin:0;
text-align:center;
}

header{
font-size:32px;
padding:25px;
letter-spacing:2px;
}

.panel{
margin:15px;
}

button{
background:#22d3ee;
border:none;
padding:12px 20px;
margin:6px;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#0891b2;
color:white;
}

#chatbox{
width:90%;
height:260px;
margin:auto;
background:#0f172a;
border-radius:10px;
padding:10px;
overflow:auto;
color:#22d3ee;
}

input{
width:75%;
padding:10px;
border-radius:6px;
border:none;
}

.send{
padding:10px 15px;
}

</style>
</head>

<body>

<header>AI-BOY OS Control Center</header>

<div class="panel">

<button onclick="status()">系统状态</button>
<button onclick="scan()">安全扫描</button>
<button onclick="startAI()">启动AI</button>

</div>

<div id="chatbox"></div>

<br>

<input id="msg" placeholder="输入命令或聊天">
<button class="send" onclick="send()">发送</button>

<script>

function status(){
add("AI-BOY：系统运行正常");
}

function scan(){
add("AI-BOY：安全扫描完成，未发现漏洞");
}

function startAI(){
add("AI-BOY：AI模块已启动");
}

function send(){

var msg=document.getElementById("msg").value;

if(msg==""){
return;
}

add("你："+msg);

setTimeout(function(){

add("AI-BOY：正在处理 "+msg);

},800);

document.getElementById("msg").value="";

}

function add(text){

var box=document.getElementById("chatbox");

box.innerHTML+=text+"<br>";

box.scrollTop=box.scrollHeight;

}

</script>

</body>
</html>
