<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI-BOY OS Ultimate</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

header{
font-size:30px;
padding:25px;
color:#22d3ee;
letter-spacing:2px;
}

.panel{
margin:10px;
}

button{
background:#22d3ee;
border:none;
padding:12px 20px;
margin:6px;
border-radius:10px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#06b6d4;
}

#chatbox{
width:90%;
height:260px;
background:#0f172a;
margin:15px auto;
border-radius:12px;
padding:15px;
overflow:auto;
text-align:left;
}

#console{
width:90%;
height:120px;
background:black;
margin:auto;
border-radius:10px;
padding:10px;
font-size:12px;
overflow:auto;
color:#22c55e;
}

#status{
width:90%;
background:#0f172a;
margin:10px auto;
border-radius:10px;
padding:15px;
display:none;
}

input{
width:65%;
padding:10px;
border-radius:8px;
border:none;
}

.ai{color:#38bdf8;}
.user{color:#22c55e;}
.sys{color:#facc15;}

</style>
</head>

<body>

<header>AI-BOY OS ULTIMATE</header>

<div class="panel">

<button onclick="startAI()">启动AI</button>
<button onclick="chat()">AI聊天</button>
<button onclick="tasks()">任务中心</button>
<button onclick="system()">系统监控</button>
<button onclick="data()">数据中心</button>

</div>

<div id="chatbox"></div>

<div>

<input id="msg" placeholder="输入消息">

<button onclick="send()">发送</button>

</div>

<div id="status"></div>

<div id="console"></div>

<script>

function log(t){

let c=document.getElementById("console")

c.innerHTML+=t+"<br>"

c.scrollTop=c.scrollHeight

}

function add(t,type){

let box=document.getElementById("chatbox")

box.innerHTML+=`<p class="${type}">${t}</p>`

box.scrollTop=box.scrollHeight

}

function startAI(){

add("系统：AI核心已启动","sys")

log("AI CORE STARTED")

}

function chat(){

add("AI：你好，我是 AI-BOY","ai")

log("CHAT MODULE LOADED")

}

function tasks(){

add("系统：任务系统启动","sys")

add("系统：当前任务 0","sys")

log("TASK CENTER ONLINE")

}

function system(){

let s=document.getElementById("status")

s.style.display="block"

let cpu=Math.floor(Math.random()*50)+20

let mem=Math.floor(Math.random()*50)+30

let net=Math.floor(Math.random()*100)

s.innerHTML=`

<h3>系统监控</h3>

CPU 使用率 ${cpu}%<br>
内存使用率 ${mem}%<br>
网络状态 ${net} ms<br>
AI 状态 运行中

`

add("系统：监控模块加载","sys")

log("SYSTEM MONITOR ONLINE")

}

function data(){

add("系统：数据中心启动","sys")

log("DATA CENTER READY")

}

function send(){

let msg=document.getElementById("msg").value

if(msg=="")return

add("你："+msg,"user")

document.getElementById("msg").value=""

add("AI：思考中...","ai")

setTimeout(()=>{

let r=[

"数据已分析",

"这个问题很有价值",

"AI正在学习你的输入",

"逻辑处理完成",

"AI理解你的问题",

"建议继续输入更多信息",

"系统正在推理"

]

let a=r[Math.floor(Math.random()*r.length)]

add("AI："+a,"ai")

log("AI RESPONSE GENERATED")

},900)

}

</script>

</body>
</html>
