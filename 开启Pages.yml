name: 开启Pages设置

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  administration: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: 开启GitHub Pages
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Happylove168998/hkjc/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}'
          echo "✅ GitHub Pages已开启"

      - name: 设置仓库为私有
        run: |
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Happylove168998/hkjc \
            -d '{"private":true}'
          echo "✅ 仓库已设为私有"
